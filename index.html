<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פיזיקה כיתה י' - שיעורים ותרגילים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --primary-dark: #5541d7;
            --accent: #00cec9;
            --accent2: #fd79a8;
            --bg: #0f0f1a;
            --bg2: #1a1a2e;
            --bg3: #16213e;
            --card: #1e1e35;
            --card-hover: #2a2a4a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --success: #00b894;
            --error: #e17055;
            --warning: #fdcb6e;
            --border: #2d2d50;
        }
        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

        /* Header */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,15,26,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.4rem; font-weight: 800; color: var(--primary-light);
            cursor: pointer;
        }
        .logo-icon { font-size: 1.8rem; }
        .progress-bar-header {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.85rem; color: var(--text-dim);
        }
        .progress-track {
            width: 160px; height: 6px; background: var(--border);
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px; transition: width 0.5s ease;
        }
        .dark-mode-toggle {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; border-radius: 8px;
            cursor: pointer; font-size: 0.85rem; font-family: inherit;
        }

        /* Layout */
        .app { display: flex; min-height: calc(100vh - 64px); position: relative; z-index: 1; }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--bg2);
            border-left: 1px solid var(--border);
            overflow-y: auto; position: sticky; top: 64px;
            height: calc(100vh - 64px); flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 1.2rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header h3 { font-size: 1rem; font-weight: 700; }
        .sidebar-search {
            margin: 0.8rem; padding: 8px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: inherit; font-size: 0.85rem; width: calc(100% - 1.6rem);
            outline: none; transition: border-color 0.2s;
        }
        .sidebar-search:focus { border-color: var(--primary); }
        .topic-group { padding: 0.5rem 0; }
        .topic-group-title {
            padding: 0.5rem 1.2rem; font-size: 0.75rem; font-weight: 700;
            color: var(--primary-light); text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lesson-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 1.2rem; cursor: pointer;
            transition: all 0.2s; border-right: 3px solid transparent;
            font-size: 0.88rem;
        }
        .lesson-item:hover { background: var(--card); }
        .lesson-item.active {
            background: rgba(108,92,231,0.15);
            border-right-color: var(--primary);
            color: var(--primary-light);
        }
        .lesson-item.completed .lesson-num { background: var(--success); color: white; }
        .lesson-num {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--border); display: flex;
            align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
        }
        .lesson-title-text { flex: 1; }
        .lesson-check { color: var(--success); font-size: 0.9rem; }

        /* Main content */
        .main-content {
            flex: 1; padding: 2rem 3rem;
            max-width: 900px; margin: 0 auto;
        }

        /* Home view */
        .home-hero {
            text-align: center; padding: 3rem 0 2rem;
        }
        .home-hero h1 {
            font-size: 2.8rem; font-weight: 900;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
        }
        .home-hero p { color: var(--text-dim); font-size: 1.1rem; max-width: 550px; margin: 0 auto; }
        .stats-row {
            display: flex; gap: 1rem; justify-content: center;
            margin: 2rem 0; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.2rem 1.8rem;
            text-align: center; min-width: 140px;
        }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary-light); }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
        .topics-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem; margin-top: 2rem;
        }
        .topic-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem; cursor: pointer;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .topic-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .topic-card-icon { font-size: 2rem; margin-bottom: 0.8rem; }
        .topic-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.4rem; }
        .topic-card p { font-size: 0.8rem; color: var(--text-dim); }
        .topic-card-progress {
            margin-top: 1rem; height: 4px; background: var(--border);
            border-radius: 2px; overflow: hidden;
        }
        .topic-card-progress-fill {
            height: 100%; background: var(--primary);
            border-radius: 2px; transition: width 0.5s;
        }

        /* Lesson view */
        .lesson-view { display: none; }
        .lesson-view.active { display: block; }
        .lesson-nav-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-family: inherit; font-size: 0.9rem;
            padding: 6px 12px; border-radius: 8px;
            transition: all 0.2s;
        }
        .back-btn:hover { color: var(--text); background: var(--card); }
        .lesson-badge {
            background: rgba(108,92,231,0.2); color: var(--primary-light);
            padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
        }
        .lesson-header { margin-bottom: 2rem; }
        .lesson-header h1 {
            font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .lesson-header .subtitle { color: var(--text-dim); font-size: 1rem; }
        .lesson-tabs {
            display: flex; gap: 4px; background: var(--bg2);
            padding: 4px; border-radius: 12px; margin-bottom: 2rem;
        }
        .lesson-tab {
            flex: 1; padding: 10px; text-align: center;
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-family: inherit; font-size: 0.88rem;
            font-weight: 600; border-radius: 10px; transition: all 0.2s;
        }
        .lesson-tab.active {
            background: var(--primary); color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Theory content */
        .theory-section { margin-bottom: 2rem; }
        .theory-section h2 {
            font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem;
            color: var(--primary-light);
            display: flex; align-items: center; gap: 8px;
        }
        .theory-section p, .theory-section li {
            line-height: 1.9; font-size: 0.95rem; color: var(--text);
            margin-bottom: 0.6rem;
        }
        .theory-section ul { padding-right: 1.5rem; margin-bottom: 1rem; }
        .formula-box {
            background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.1));
            border: 1px solid rgba(108,92,231,0.3);
            border-radius: 14px; padding: 1.2rem 1.5rem;
            margin: 1rem 0; text-align: center;
        }
        .formula {
            font-size: 1.5rem; font-weight: 700;
            color: var(--accent); direction: ltr;
            font-family: 'Courier New', monospace;
        }
        .formula-desc {
            font-size: 0.82rem; color: var(--text-dim);
            margin-top: 0.5rem;
        }
        .example-box {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.2rem 1.5rem; margin: 1rem 0;
        }
        .example-box h4 {
            color: var(--warning); font-size: 0.9rem;
            margin-bottom: 0.8rem; display: flex;
            align-items: center; gap: 6px;
        }
        .example-box p { font-size: 0.9rem; line-height: 1.8; }
        .example-box .solution {
            margin-top: 0.8rem; padding-top: 0.8rem;
            border-top: 1px solid var(--border);
        }
        .key-point {
            background: rgba(0,206,201,0.1); border-right: 3px solid var(--accent);
            padding: 1rem 1.2rem; border-radius: 0 10px 10px 0;
            margin: 1rem 0; font-size: 0.9rem;
        }

        /* Exercises */
        .exercise-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.5rem; margin-bottom: 1.2rem;
        }
        .exercise-card h4 {
            font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 8px;
        }
        .exercise-difficulty {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }
        .diff-easy { background: rgba(0,184,148,0.2); color: var(--success); }
        .diff-medium { background: rgba(253,203,110,0.2); color: var(--warning); }
        .diff-hard { background: rgba(225,112,85,0.2); color: var(--error); }
        .exercise-text { font-size: 0.92rem; line-height: 1.8; margin-bottom: 1rem; }
        .exercise-hint {
            background: var(--bg2); padding: 0.8rem 1rem; border-radius: 10px;
            font-size: 0.85rem; color: var(--text-dim);
            display: none; margin-bottom: 1rem;
        }
        .exercise-hint.show { display: block; }
        .exercise-answer {
            background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3);
            padding: 1rem; border-radius: 10px; font-size: 0.9rem;
            display: none; margin-top: 0.8rem;
        }
        .exercise-answer.show { display: block; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 8px 16px; border-radius: 10px; border: none;
            cursor: pointer; font-family: inherit; font-size: 0.82rem;
            font-weight: 600; transition: all 0.2s;
        }
        .btn-hint { background: var(--bg2); color: var(--text-dim); border: 1px solid var(--border); }
        .btn-hint:hover { border-color: var(--primary); color: var(--primary-light); }
        .btn-answer { background: var(--primary); color: white; }
        .btn-answer:hover { background: var(--primary-dark); }

        /* Quiz */
        .quiz-container { }
        .quiz-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .quiz-progress-text { font-size: 0.85rem; color: var(--text-dim); }
        .quiz-score {
            background: var(--card); padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
        }
        .quiz-question {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.8rem; margin-bottom: 1.2rem;
        }
        .quiz-question h3 {
            font-size: 1.05rem; font-weight: 700; margin-bottom: 1.2rem;
            line-height: 1.6;
        }
        .quiz-option {
            display: block; width: 100%; text-align: right;
            padding: 12px 16px; margin-bottom: 8px;
            background: var(--bg2); border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer; font-family: inherit;
            font-size: 0.9rem; color: var(--text); transition: all 0.2s;
        }
        .quiz-option:hover:not(.disabled) {
            border-color: var(--primary); background: rgba(108,92,231,0.1);
        }
        .quiz-option.correct {
            border-color: var(--success); background: rgba(0,184,148,0.15);
            color: var(--success);
        }
        .quiz-option.wrong {
            border-color: var(--error); background: rgba(225,112,85,0.15);
            color: var(--error);
        }
        .quiz-option.disabled { cursor: default; opacity: 0.7; }
        .quiz-explanation {
            margin-top: 1rem; padding: 1rem; border-radius: 10px;
            background: var(--bg2); font-size: 0.88rem; line-height: 1.7;
            display: none;
        }
        .quiz-explanation.show { display: block; }
        .quiz-nav { display: flex; justify-content: space-between; margin-top: 1rem; }
        .quiz-results {
            text-align: center; padding: 2rem;
            background: var(--card); border-radius: 16px;
        }
        .quiz-results h2 { font-size: 1.5rem; margin-bottom: 1rem; }
        .quiz-results .score-big {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .complete-btn {
            display: block; width: 100%; margin-top: 2rem;
            padding: 14px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; color: white; font-family: inherit;
            font-size: 1rem; font-weight: 700; border-radius: 14px;
            cursor: pointer; transition: opacity 0.2s;
        }
        .complete-btn:hover { opacity: 0.9; }
        .lesson-nav-bottom {
            display: flex; justify-content: space-between;
            margin-top: 2rem; padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .nav-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); cursor: pointer; font-family: inherit;
            font-size: 0.88rem; font-weight: 600; transition: all 0.2s;
        }
        .nav-btn:hover { border-color: var(--primary); }
        .nav-btn.primary-btn {
            background: var(--primary); border-color: var(--primary);
            color: white;
        }

        /* Mobile */
        .mobile-menu-btn {
            display: none; background: none; border: none;
            color: var(--text); font-size: 1.5rem; cursor: pointer;
        }
        @media (max-width: 900px) {
            .sidebar {
                position: fixed; right: 0; top: 64px;
                z-index: 99; transform: translateX(100%);
                width: 300px;
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 1.5rem; }
            .home-hero h1 { font-size: 2rem; }
        }
        @media (max-width: 600px) {
            .header-inner { padding: 0; }
            .progress-bar-header { display: none; }
            .stats-row { gap: 0.6rem; }
            .stat-card { min-width: 100px; padding: 1rem; }
            .topics-grid { grid-template-columns: 1fr; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <header>
        <div class="header-inner">
            <div class="logo" onclick="showHome()">
                <span class="logo-icon">⚛️</span>
                <span>פיזיקה י'</span>
            </div>
            <div class="progress-bar-header">
                <span id="progressText">0/30 שיעורים</span>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="dark-mode-toggle" onclick="resetProgress()">🔄 אפס התקדמות</button>
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            </div>
        </div>
    </header>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📚 תוכן השיעורים</h3>
            </div>
            <input type="text" class="sidebar-search" placeholder="🔍 חיפוש שיעור..." oninput="filterLessons(this.value)" id="lessonSearch">
            <div id="sidebarList"></div>
        </aside>

        <main class="main-content">
            <div id="homeView">
                <div class="home-hero">
                    <h1>🚀 פיזיקה לכיתה י'</h1>
                    <p>30 שיעורים מקיפים עם תרגילים, שאלות אמריקאיות והסברים מפורטים. בואו נתחיל!</p>
                </div>
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-num">30</div>
                        <div class="stat-label">שיעורים</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statCompleted">0</div>
                        <div class="stat-label">הושלמו</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statQuiz">0%</div>
                        <div class="stat-label">ציון ממוצע</div>
                    </div>
                </div>
                <div class="topics-grid" id="topicsGrid"></div>
            </div>

            <div id="lessonView" class="lesson-view"></div>
        </main>
    </div>

<script src="lessons-data.js"></script>
<script>
const topicGroups = [
    { name: "מבוא", icon: "📏", lessons: [1, 2] },
    { name: "קינמטיקה", icon: "🚗", lessons: [3, 4, 5] },
    { name: "חוקי ניוטון", icon: "⚖️", lessons: [6, 7, 8] },
    { name: "כוחות", icon: "💪", lessons: [9, 10, 11, 12, 13] },
    { name: "אנרגיה", icon: "⚡", lessons: [14, 15, 16, 17, 18] },
    { name: "תנע ומתקף", icon: "🎱", lessons: [19, 20, 21] },
    { name: "תנועה מעגלית", icon: "🎡", lessons: [22, 23] },
    { name: "כבידה", icon: "🌌", lessons: [24] },
    { name: "קינמטיקה מתקדמת", icon: "🏀", lessons: [25, 26] },
    { name: "נושאים נוספים", icon: "🔩", lessons: [27, 28, 29, 30] }
];

let completedLessons = JSON.parse(localStorage.getItem('physicsCompleted') || '[]');
let quizScores = JSON.parse(localStorage.getItem('physicsScores') || '{}');
let currentLesson = null;
let currentTab = 'theory';
let currentQuizIndex = 0;
let quizAnswered = [];

function init() {
    createStars();
    renderSidebar();
    renderHome();
    updateProgress();
}

function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;--d:${Math.random()*3+1}s;animation-delay:${Math.random()*2}s`;
        container.appendChild(star);
    }
}

function renderSidebar() {
    const container = document.getElementById('sidebarList');
    container.innerHTML = '';
    topicGroups.forEach(group => {
        const div = document.createElement('div');
        div.className = 'topic-group';
        div.innerHTML = `<div class="topic-group-title">${group.icon} ${group.name}</div>`;
        group.lessons.forEach(id => {
            const lesson = lessonsData.find(l => l.id === id);
            const completed = completedLessons.includes(id);
            const active = currentLesson && currentLesson.id === id;
            const item = document.createElement('div');
            item.className = `lesson-item ${completed ? 'completed' : ''} ${active ? 'active' : ''}`;
            item.onclick = () => openLesson(id);
            item.dataset.id = id;
            item.innerHTML = `
                <span class="lesson-num">${id}</span>
                <span class="lesson-title-text">${lesson.title}</span>
                ${completed ? '<span class="lesson-check">✓</span>' : ''}
            `;
            div.appendChild(item);
        });
        container.appendChild(div);
    });
}

function filterLessons(query) {
    const items = document.querySelectorAll('.lesson-item');
    items.forEach(item => {
        const text = item.querySelector('.lesson-title-text').textContent;
        item.style.display = text.includes(query) ? 'flex' : 'none';
    });
    document.querySelectorAll('.topic-group').forEach(group => {
        const visible = group.querySelectorAll('.lesson-item[style="display: flex"], .lesson-item:not([style])');
        const hidden = group.querySelectorAll('.lesson-item[style="display: none"]');
        group.style.display = hidden.length === group.querySelectorAll('.lesson-item').length ? 'none' : 'block';
    });
}

function renderHome() {
    document.getElementById('homeView').style.display = 'block';
    document.getElementById('lessonView').style.display = 'none';
    document.getElementById('lessonView').className = 'lesson-view';
    currentLesson = null;
    renderSidebar();
    updateHomeStats();
    renderTopicCards();
}

function updateHomeStats() {
    document.getElementById('statCompleted').textContent = completedLessons.length;
    const scores = Object.values(quizScores);
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    document.getElementById('statQuiz').textContent = avg + '%';
}

function renderTopicCards() {
    const grid = document.getElementById('topicsGrid');
    grid.innerHTML = '';
    topicGroups.forEach(group => {
        const completed = group.lessons.filter(id => completedLessons.includes(id)).length;
        const pct = Math.round(completed / group.lessons.length * 100);
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.onclick = () => openLesson(group.lessons[0]);
        card.innerHTML = `
            <div class="topic-card-icon">${group.icon}</div>
            <h3>${group.name}</h3>
            <p>${group.lessons.length} שיעורים · ${completed} הושלמו</p>
            <div class="topic-card-progress"><div class="topic-card-progress-fill" style="width:${pct}%"></div></div>
        `;
        grid.appendChild(card);
    });
}

function updateProgress() {
    const pct = Math.round(completedLessons.length / 30 * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${completedLessons.length}/30 שיעורים`;
}

function showHome() {
    renderHome();
}

function openLesson(id) {
    const lesson = lessonsData.find(l => l.id === id);
    if (!lesson) return;
    currentLesson = lesson;
    currentTab = 'theory';
    currentQuizIndex = 0;
    quizAnswered = [];

    document.getElementById('homeView').style.display = 'none';
    const view = document.getElementById('lessonView');
    view.style.display = 'block';
    view.className = 'lesson-view active';

    renderLessonContent();
    renderSidebar();
    closeSidebar();
    window.scrollTo(0, 0);
}

function renderLessonContent() {
    const lesson = currentLesson;
    const view = document.getElementById('lessonView');

    const prevLesson = lesson.id > 1 ? lessonsData.find(l => l.id === lesson.id - 1) : null;
    const nextLesson = lesson.id < 30 ? lessonsData.find(l => l.id === lesson.id + 1) : null;

    view.innerHTML = `
        <div class="lesson-nav-top">
            <button class="back-btn" onclick="showHome()">→ חזרה לתפריט</button>
            <span class="lesson-badge">שיעור ${lesson.id} / 30</span>
        </div>
        <div class="lesson-header">
            <h1>${lesson.icon} ${lesson.title}</h1>
            <div class="subtitle">${lesson.subtitle}</div>
        </div>
        <div class="lesson-tabs">
            <button class="lesson-tab ${currentTab==='theory'?'active':''}" onclick="switchTab('theory')">📖 תיאוריה</button>
            <button class="lesson-tab ${currentTab==='exercises'?'active':''}" onclick="switchTab('exercises')">✏️ תרגילים</button>
            <button class="lesson-tab ${currentTab==='quiz'?'active':''}" onclick="switchTab('quiz')">🧠 מבחן</button>
        </div>
        <div id="tabTheory" class="tab-content ${currentTab==='theory'?'active':''}">
            ${renderTheory(lesson)}
        </div>
        <div id="tabExercises" class="tab-content ${currentTab==='exercises'?'active':''}">
            ${renderExercises(lesson)}
        </div>
        <div id="tabQuiz" class="tab-content ${currentTab==='quiz'?'active':''}">
            <div id="quizContent">${renderQuiz(lesson)}</div>
        </div>
        <button class="complete-btn" onclick="completeLesson(${lesson.id})">
            ${completedLessons.includes(lesson.id) ? '✓ שיעור הושלם!' : 'סמן כהושלם ✓'}
        </button>
        <div class="lesson-nav-bottom">
            ${prevLesson ? `<button class="nav-btn" onclick="openLesson(${prevLesson.id})">→ ${prevLesson.title}</button>` : '<div></div>'}
            ${nextLesson ? `<button class="nav-btn primary-btn" onclick="openLesson(${nextLesson.id})">${nextLesson.title} ←</button>` : '<div></div>'}
        </div>
    `;
}

function renderTheory(lesson) {
    let html = '';
    lesson.theory.forEach(section => {
        html += `<div class="theory-section"><h2>${section.heading}</h2><p>${section.content}</p>`;
        if (section.list) {
            html += '<ul>' + section.list.map(item => `<li>${item}</li>`).join('') + '</ul>';
        }
        html += '</div>';
    });
    if (lesson.formulas && lesson.formulas.length) {
        html += '<div class="theory-section"><h2>📐 נוסחאות</h2>';
        lesson.formulas.forEach(f => {
            html += `<div class="formula-box"><div class="formula">${f.eq}</div><div class="formula-desc">${f.desc}</div></div>`;
        });
        html += '</div>';
    }
    if (lesson.examples && lesson.examples.length) {
        html += '<div class="theory-section"><h2>💡 דוגמאות</h2>';
        lesson.examples.forEach(ex => {
            html += `<div class="example-box"><h4>📝 שאלה:</h4><p>${ex.q}</p><div class="solution"><h4>✅ פתרון:</h4><p>${ex.a}</p></div></div>`;
        });
        html += '</div>';
    }
    return html;
}

function renderExercises(lesson) {
    if (!lesson.exercises || !lesson.exercises.length) return '<p>אין תרגילים לשיעור זה.</p>';
    return lesson.exercises.map((ex, i) => {
        const diffLabel = ex.diff === 'easy' ? 'קל' : ex.diff === 'medium' ? 'בינוני' : 'מאתגר';
        const diffClass = ex.diff === 'easy' ? 'diff-easy' : ex.diff === 'medium' ? 'diff-medium' : 'diff-hard';
        return `
            <div class="exercise-card">
                <h4>תרגיל ${i+1} <span class="exercise-difficulty ${diffClass}">${diffLabel}</span></h4>
                <div class="exercise-text">${ex.text}</div>
                <div class="exercise-hint" id="hint_${i}">${ex.hint}</div>
                <div class="exercise-answer" id="answer_${i}">✅ <strong>פתרון:</strong> ${ex.answer}</div>
                <div class="btn-row">
                    <button class="btn btn-hint" onclick="toggleHint(${i})">💡 רמז</button>
                    <button class="btn btn-answer" onclick="toggleAnswer(${i})">📋 פתרון</button>
                </div>
            </div>
        `;
    }).join('');
}

function toggleHint(i) {
    document.getElementById('hint_'+i).classList.toggle('show');
}

function toggleAnswer(i) {
    document.getElementById('answer_'+i).classList.toggle('show');
}

function renderQuiz(lesson) {
    if (!lesson.quiz || !lesson.quiz.length) return '<p>אין מבחן לשיעור זה.</p>';
    const q = lesson.quiz[currentQuizIndex];
    const answered = quizAnswered[currentQuizIndex] !== undefined;
    const correctCount = quizAnswered.filter((a, i) => a === lesson.quiz[i].correct).length;

    if (currentQuizIndex >= lesson.quiz.length) {
        const score = Math.round(correctCount / lesson.quiz.length * 100);
        quizScores[lesson.id] = score;
        localStorage.setItem('physicsScores', JSON.stringify(quizScores));
        updateHomeStats();
        return `
            <div class="quiz-results">
                <h2>🎉 סיימת את המבחן!</h2>
                <div class="score-big">${score}%</div>
                <p style="margin-top:1rem;color:var(--text-dim)">${correctCount} מתוך ${lesson.quiz.length} נכונות</p>
                <button class="btn btn-answer" style="margin-top:1rem" onclick="resetQuiz()">🔄 נסה שוב</button>
            </div>
        `;
    }

    return `
        <div class="quiz-header">
            <span class="quiz-progress-text">שאלה ${currentQuizIndex + 1} מתוך ${lesson.quiz.length}</span>
            <span class="quiz-score">✓ ${correctCount}</span>
        </div>
        <div class="quiz-question">
            <h3>${q.q}</h3>
            ${q.options.map((opt, i) => {
                let cls = '';
                if (answered) {
                    cls = 'disabled';
                    if (i === q.correct) cls += ' correct';
                    else if (i === quizAnswered[currentQuizIndex] && i !== q.correct) cls += ' wrong';
                }
                return `<button class="quiz-option ${cls}" onclick="answerQuiz(${i})" ${answered?'disabled':''}>${opt}</button>`;
            }).join('')}
            <div class="quiz-explanation ${answered?'show':''}" id="quizExplanation">
                💡 ${q.explanation}
            </div>
        </div>
        <div class="quiz-nav">
            ${currentQuizIndex > 0 ? `<button class="nav-btn" onclick="prevQuizQ()">→ הקודם</button>` : '<div></div>'}
            ${answered ? `<button class="nav-btn primary-btn" onclick="nextQuizQ()">הבא ←</button>` : '<div></div>'}
        </div>
    `;
}

function answerQuiz(i) {
    quizAnswered[currentQuizIndex] = i;
    document.getElementById('quizContent').innerHTML = renderQuiz(currentLesson);
}

function nextQuizQ() {
    currentQuizIndex++;
    document.getElementById('quizContent').innerHTML = renderQuiz(currentLesson);
}

function prevQuizQ() {
    currentQuizIndex = Math.max(0, currentQuizIndex - 1);
    document.getElementById('quizContent').innerHTML = renderQuiz(currentLesson);
}

function resetQuiz() {
    currentQuizIndex = 0;
    quizAnswered = [];
    document.getElementById('quizContent').innerHTML = renderQuiz(currentLesson);
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.lesson-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function completeLesson(id) {
    if (!completedLessons.includes(id)) {
        completedLessons.push(id);
    }
    localStorage.setItem('physicsCompleted', JSON.stringify(completedLessons));
    updateProgress();
    renderSidebar();
    renderLessonContent();
}

function resetProgress() {
    if (confirm('האם אתה בטוח שברצונך לאפס את כל ההתקדמות?')) {
        completedLessons = [];
        quizScores = {};
        localStorage.removeItem('physicsCompleted');
        localStorage.removeItem('physicsScores');
        updateProgress();
        renderHome();
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
}

init();
</script>
</body>
</html>
